name: Lint

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install linting tools
        run: |
          pip install ruff black mypy types-setuptools types-requests
          pip install -r backend/requirements.txt
          
      - name: Run Ruff
        run: ruff check backend/
        
      - name: Run Black
        run: black --check backend/
        
      - name: Run Mypy
        run: mypy backend/ --ignore-missing-imports || true # non-blocking initially

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: cd frontend && npm ci
        
      - name: Run Type Check
        run: cd frontend && npx tsc --noEmit
